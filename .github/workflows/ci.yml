name: CI



on:

  push:

    branches: [main, master]

  pull_request:

    branches: [main, master]



concurrency:

  group: ci-${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true



jobs:

  linux:

    name: Linux (ubuntu-latest, clang)

    runs-on: ubuntu-latest

    timeout-minutes: 90

    steps:

      - uses: actions/checkout@v4



      - name: Install build dependencies

        run: |

          sudo apt-get update

          sudo apt-get install -y --no-install-recommends \

            clang qt6-base-dev qt6-charts-dev libqt6sql6-sqlite \

            cmake ninja-build



      - name: Configure (clang++)

        run: |

          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \

            -DCMAKE_CXX_COMPILER=clang++ \

            -DCMAKE_C_COMPILER=clang



      - name: Build

        run: cmake --build build -j"$(nproc)"



      - name: Run unit tests (headless)

        env:

          QT_QPA_PLATFORM: offscreen

        run: ctest --test-dir build --output-on-failure -j4



      - name: Run real-data evaluation tests

        env:

          QT_QPA_PLATFORM: offscreen

        run: |

          set -o pipefail

          chmod +x scripts/check_eval_thresholds.sh

          ctest --test-dir build \

            -R "test_local_datasets|test_real_data_evaluation" \

            --output-on-failure -j1 \

            --timeout 900 -V 2>&1 | tee /tmp/ctest-real.log

          grep "EVAL:" /tmp/ctest-real.log > /tmp/eval.log

          scripts/check_eval_thresholds.sh /tmp/eval.log



  windows:

    name: Windows (windows-latest, MSVC)

    runs-on: windows-latest

    timeout-minutes: 120

    steps:

      - uses: actions/checkout@v4



      - name: Install Qt 6.8.3 (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtcharts
          aqtversion: "==3.3.*"

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        run: choco install ninja -y

      - name: Configure (MSVC)

        shell: pwsh

        env:
          QT_ROOT_DIR: ${{ env.QT_ROOT_DIR }}

        run: |

          if (-not $env:QT_ROOT_DIR) { throw "QT_ROOT_DIR is not set" }

          cmake -B build-msvc-release -G Ninja `

            -DCMAKE_BUILD_TYPE=Release `

            "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR" `

            "-DCMAKE_CXX_COMPILER=cl" `

            "-DCMAKE_C_COMPILER=cl"



      - name: Build

        shell: pwsh

        run: |

          cmake --build build-msvc-release -j



      - name: Run unit tests (headless, skip slow real-data)

        shell: pwsh

        env:

          QT_QPA_PLATFORM: offscreen
          QT_ROOT_DIR: ${{ env.QT_ROOT_DIR }}

        run: |

          $env:QT_PLUGIN_PATH = "$env:QT_ROOT_DIR\plugins"

          ctest --test-dir build-msvc-release `

            -E "test_local_datasets|test_real_data_evaluation" `

            --output-on-failure -j4


