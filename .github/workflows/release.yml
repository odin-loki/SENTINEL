name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows release
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6.8.3 (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtcharts
          aqtversion: "==3.3.*"

      - name: Derive version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^v(.+)$') { $ver = $Matches[1] } else { $ver = $tag }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release version: $ver"

      - name: Install NSIS
        run: choco install nsis -y

      - uses: ilammy/msvc-dev-cmd@v1

      - uses: actions/setup-cmake@v1
        with:
          cmake-version: "3.31.x"

      - name: Build and package Windows release
        shell: pwsh
        env:
          QT_ROOT_DIR: ${{ env.QT_ROOT_DIR }}
          SIGN_CERT: ${{ secrets.SIGN_CERT }}
          SIGN_PASSWORD: ${{ secrets.SIGN_PASSWORD }}
        run: |
          $ErrorActionPreference = "Stop"
          $qt = $env:QT_ROOT_DIR
          if (-not $qt) {
            throw "QT_ROOT_DIR is not set after install-qt-action"
          }
          Write-Host "Using Qt at: $qt"
          $buildDir = "build-msvc-release"
          $ver = "${{ steps.version.outputs.version }}"
          $env:QT_PLUGIN_PATH = "$qt\plugins"
          $env:QT_QPA_PLATFORM = "offscreen"
          cmake --version
          cmake -S . -B $buildDir -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$qt" `
            -DSENTINEL_VERSION="$ver"
          if ($LASTEXITCODE -ne 0) { throw "cmake configure failed" }
          cmake --build $buildDir --config Release -j 4
          if ($LASTEXITCODE -ne 0) { throw "cmake build failed" }
          ctest --test-dir $buildDir -C Release -E "test_local_datasets|test_real_data_evaluation" --output-on-failure -j4
          if ($LASTEXITCODE -ne 0) { throw "ctest failed" }
          cmake --build $buildDir --config Release --target sentinel -j 4
          if ($LASTEXITCODE -ne 0) { throw "sentinel target build failed" }
          & packaging/windows/deploy_portable.ps1 `
            -BuildDir $buildDir `
            -QtPath $qt `
            -Version $ver `
            -InstallRoot "${{ github.workspace }}/packaging/pkg"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/SENTINEL-*-win64-portable.zip
            dist/SENTINEL-*-win64-setup.exe
          if-no-files-found: error

  build-linux:
    name: Linux release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang lld \
            qt6-base-dev qt6-charts-dev libqt6sql6-sqlite \
            cmake ninja-build dpkg-dev

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${ver}"

      - name: Build Linux tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
          SENTINEL_VERSION: ${{ steps.version.outputs.version }}
          CC: clang
          CXX: clang++
          QT_QPA_PLATFORM: offscreen
        run: |
          chmod +x packaging/linux/build_release.sh
          ./packaging/linux/build_release.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: |
            dist/SENTINEL-*-linux-x86_64.tar.gz
            dist/*.deb
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          ver="${tag#v}"
          echo "version=${ver}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: SENTINEL ${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/SENTINEL-*-win64-portable.zip
            release-artifacts/SENTINEL-*-win64-setup.exe
            release-artifacts/SENTINEL-*-linux-x86_64.tar.gz
            release-artifacts/*.deb